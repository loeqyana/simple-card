<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>devChallenges.io | Minimal Blog Card</title>

    <!--You are welcome to delete these styles or modify them in your own stylesheet -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap');
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        margin-top: 200px;
        margin-left: 600px;
      }

      .kartu {
        width: 400px;
        font-family: 'sora', sans-serif;
        padding: 20px;
        border: 6px rgb(146, 138, 138);
        border-radius: 10px;
         box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      }

      .gambar {
        width: 100%;
      }

      .gambar img {
        width: 100%;
        height: auto;
        object-fit: cover;
        border-radius: 10px;
      }
      .konten {
        padding: 16px;
        font-size: 14px;
      }

      .tag {
        padding: 16px;
        font-size: 12px;
      }

      .tombol {
        background-color: #F2EAFD;
        color: #7C19EE;
        padding: 8px 20px;
        border-radius: 50px;
        width: max-content;
        font-size: 12px;
      }

      .author-info {
        font-size: 14px;
        text-align: left;
        margin-top: 16px;
        color: rgb(55, 65, 81);
        margin-left: 65px;
      }

      .author-info a {
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="kartu">
      <div class="gambar">
        <img src="resources/Cactus@2x.jpg" alt="Tanaman Kaktus">
      </div>
      <br>
      <div class="tombol">
        <p><strong>Design</strong></p>
      </div>
      <div class="konten">
        <h2>Embracing Minimalism</h2>
        <br>
        <p>From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
      </div>
      <br>
      <hr>
      <div class="tag">
        <p>Annie Spratt</p>
      </div>
    </div>


    <div class="author-info">
      Coded by <a href="#">Luqyana</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank"
        >devChallenges.io</a
      >.
    </div>
  </body>
</html>
